services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Dashboard — Tailscale only, blocked from public via ufw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./data/acme.json:/data/acme.json
      - ./data/config:/data/config:ro
      - logs:/var/log/traefik  # Shared with CrowdSec for log parsing
      - ./secrets:/secrets:ro # For any future secrets like TLS certs, API keys, etc.
    networks:
      - proxy

volumes:
  logs:
    name: traefik_logs  # Named volume shared with CrowdSec container

networks:
  proxy:
    external: true