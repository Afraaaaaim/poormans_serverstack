api:
  dashboard: true
  insecure: true  # Dashboard on port 8080, Tailscale-only access

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: "afraimjoseph@gmail.com"
      storage: /data/acme.json
      httpChallenge:
        entryPoint: web

providers:
  file:
    filename: /data/config/dynamic.yml
    watch: true

# Logs to stdout (docker logs)
log:
  level: INFO

# Access logs written to file so CrowdSec can read them
accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100    # Buffer 100 lines before writing to disk

# CrowdSec bouncer plugin
experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.4.2"